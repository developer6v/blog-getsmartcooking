<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Smart Cooking, Thermomix with Natascha</title>
  <meta name="description" content="Get Smart Cooking. Thermomix with Natascha, Independent Advisor.">

  <!-- ============ SEO: hreflang map ============ -->
  <link rel="alternate" hreflang="en" href="https://getsmartcooking.com/en/">
  <link rel="alternate" hreflang="es" href="https://getsmartcooking.com/es/">
  <link rel="alternate" hreflang="pt" href="https://getsmartcooking.com/pt/">
  <link rel="alternate" hreflang="x-default" href="https://getsmartcooking.com/en/">
  <link rel="canonical" href="https://getsmartcooking.com/en/">

  <!-- ============ FALLBACK 1: meta refresh ============ -->
  <!-- If JavaScript is disabled, send the visitor to the English version immediately. -->
  <meta http-equiv="refresh" content="0; url=/en/">

  <!-- ============ FALLBACK 2: keep search engines off this redirect page ============ -->
  <meta name="robots" content="noindex, follow">

  <!-- ============ LANGUAGE DETECTION + REDIRECT ============ -->
  <script>
    (function() {
      try {
        // Read the user's primary browser language preference.
        // navigator.languages[0] is the most preferred; falls back to navigator.language.
        var langSource = (navigator.languages && navigator.languages[0]) || navigator.language || navigator.userLanguage || '';
        var lang = langSource.toLowerCase();

        // Default is English unless we detect Portuguese or Spanish.
        var target = '/en/';

        if (lang.indexOf('pt') === 0) {
          // Matches pt, pt-BR, pt-PT, etc.
          target = '/pt/';
        } else if (lang.indexOf('es') === 0) {
          // Matches es, es-MX, es-ES, es-AR, etc.
          target = '/es/';
        }

        // Use replace() so the redirector does not appear in browser history.
        // If the user hits "back" from /pt/, they go to where they came from, not here.
        window.location.replace(target);
      } catch (e) {
        // If anything goes wrong, fall back to English.
        window.location.replace('/en/');
      }
    })();
  </script>

  <style>
    /* Minimal styling shown only if JavaScript AND meta-refresh both fail
       (extremely rare, but covers very old or restricted browsers). */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F5EFE6;
      color: #1A1612;
      margin: 0;
      padding: 60px 24px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 { font-size: 1.5rem; font-weight: 400; margin-bottom: 16px; }
    p { color: #4A4744; margin-bottom: 32px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: 12px 0; }
    a {
      color: #C66B3D;
      text-decoration: none;
      font-size: 1.1rem;
      border-bottom: 1px solid #C66B3D;
      padding-bottom: 2px;
    }
    a:hover { color: #A0522D; }
  </style>
</head>
<body>
  <!-- This content is only visible if BOTH JavaScript and meta-refresh fail.
       Provides 3 manual links as a last resort. -->
  <h1>Get Smart Cooking</h1>
  <p>Redirecting you to your language...</p>
  <ul>
    <li><a href="/en/">Continue in English</a></li>
    <li><a href="/es/">Continuar en español</a></li>
    <li><a href="/pt/">Continuar em português</a></li>
  </ul>
</body>
</html>
