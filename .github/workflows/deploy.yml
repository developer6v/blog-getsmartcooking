  name: Build and Deploy to FTP
  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Prepare project
          id: locate
          run: |
            TINA_CFG=$(find . -path "*/tina/config.ts" -not -path "*/node_modules/*" -not -path "./.git/*" | head -1)
            if [ -z "$TINA_CFG" ]; then
              echo "tina/config.ts not found in repo"
              exit 1
            fi
            DIR=$(dirname "$(dirname "$TINA_CFG")")
            echo "Project dir: $DIR"
            if [ ! -f "$DIR/package.json" ] && [ -f "package.json" ]; then
              echo "Copying root package.json into $DIR"
              cp package.json "$DIR/package.json"
            fi
            echo "dir=$DIR" >> $GITHUB_OUTPUT
            ls -la "$DIR"

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Cache node_modules
          uses: actions/cache@v4
          with:
            path: "${{ steps.locate.outputs.dir }}/node_modules"
            key: node-modules-${{ runner.os }}-${{ hashFiles(format('{0}/package.json', steps.locate.outputs.dir)) }}

        - name: Install dependencies
          working-directory: "${{ steps.locate.outputs.dir }}"
          run: npm install --prefer-offline --no-audit --no-fund

        - name: Build
          working-directory: "${{ steps.locate.outputs.dir }}"
          env:
            NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
            TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          run: npm run build

        - name: Deploy via FTP
          uses: SamKirkland/FTP-Deploy-Action@v4.3.5
          with:
            server: ${{ secrets.FTP_HOST }}
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            local-dir: "${{ steps.locate.outputs.dir }}/dist/"
            server-dir: ./
            protocol: ftps
            port: 21